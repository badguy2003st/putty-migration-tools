name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags (v1.0.0, v1.0.1, etc.)
  workflow_dispatch:  # Allow manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Use Node.js 24 for actions

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read  # Read repository contents
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
            ext: .exe
          - os: ubuntu-latest
            platform: linux
            ext: ''
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tui/requirements.txt
          pip install nuitka ordered-set
          
          # PPK v3 performance optimization (v1.0.4+)
          pip install argon2-cffi-bindings || echo "Warning: argon2-cffi-bindings not available"
      
      - name: Extract version from tag
        id: get_version
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" == "tag" ]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="dev"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Build binary with Nuitka
        run: |
          python build.py --version ${{ steps.get_version.outputs.version }}
        timeout-minutes: 30
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: putty-migrate-${{ matrix.platform }}
          path: |
            dist/*.exe
            dist/putty-migrate-v*-linux
          retention-days: 5
  
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    permissions:
      contents: write  # Allow creating releases and uploading assets
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Extract version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: PuTTY Migration Tools v${{ steps.get_version.outputs.version }}
          body: |
            ## PuTTY Migration Tools v${{ steps.get_version.outputs.version }}
            
            **Native compiled binaries** using Nuitka - Single file executables, no installation required!
            
            ### Downloads
            
            - **Windows**: `putty-migrate-v${{ steps.get_version.outputs.version }}-windows.exe` (~25 MB)
            - **Linux**: `putty-migrate-v${{ steps.get_version.outputs.version }}-linux` (~23 MB)
            
            ### Quick Start
            
            **Windows:**
            ```cmd
            .\putty-migrate-v${{ steps.get_version.outputs.version }}-windows.exe
            ```
            
            **Linux:**
            ```bash
            chmod +x putty-migrate-v${{ steps.get_version.outputs.version }}-linux
            ./putty-migrate-v${{ steps.get_version.outputs.version }}-linux
            ```
            
            ### Documentation
            
            - [README.md](https://github.com/${{ github.repository }}/blob/main/README.md)
            - [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)
            - [Installation Guide](https://github.com/${{ github.repository }}/tree/main/docs/installation)
            
            ### Features
            
            - **Interactive TUI** - Beautiful terminal interface
            - **Powerful CLI** - Automation-friendly commands
            - **PPK v3 Support** - Convert encrypted PuTTY keys (PuTTY 0.75+)
            - **Bitwarden Export** - Secure password manager integration
            - **PPK to OpenSSH** - Convert PuTTY keys to OpenSSH format
            - **Tabby Terminal** - Export sessions to Tabby config
            - **SSH Config** - Generate OpenSSH config files
            
            ### Technical Details
            
            - **Compiler**: Nuitka (native Python-to-C compilation)
            - **PPK v3**: Fast Argon2id with automatic backend selection
            - **No DLL dependencies** - all embedded
            - **Single executable** - no extraction needed
            - **Python 3.11** compatible
            
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for full release notes.
          files: |
            artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
